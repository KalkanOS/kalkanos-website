<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KalkanOS | Armoring the Digital Frontier</title>
    <style>
        :root {
            --bg-color: #050505;
            --primary-color: #00ff41; 
            --secondary-color: #fff;
            --accent-color: #008f11;
            --shadow-color: rgba(0, 255, 65, 0.2);
            --font-main: 'Share Tech Mono', monospace;
        }

        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--secondary-color);
            font-family: var(--font-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
        }

        /* Scanline effect */
        body::before {
            content: "";
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px; z-index: 10; pointer-events: none;
        }

        .main-frame {
            border: 1px solid var(--accent-color);
            padding: 60px;
            text-align: center;
            position: relative;
            box-shadow: 0 0 40px var(--shadow-color);
            background: rgba(5, 5, 5, 0.9);
            z-index: 5;
            max-width: 800px;
        }

        .main-frame::before {
            content: "[ ENCRYPTION ACTIVE ]";
            position: absolute; top: -10px; left: 20px;
            background-color: var(--bg-color);
            padding: 0 10px; color: var(--accent-color); font-size: 0.7rem; letter-spacing: 2px;
        }

        .logo {
            font-size: 4.5rem;
            font-weight: bold;
            color: var(--primary-color);
            letter-spacing: 12px;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-shadow: 0 0 15px var(--primary-color);
        }

        .tagline {
            font-size: 1.1rem;
            margin-bottom: 40px;
            opacity: 0.9;
            letter-spacing: 3px;
            color: var(--secondary-color);
            border-right: 2px solid var(--primary-color);
            display: inline-block;
            padding-right: 5px;
            animation: typing 3s steps(40, end), blink-caret .75s step-end infinite;
            white-space: nowrap;
            overflow: hidden;
        }

        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
            text-align: left;
            border-top: 1px solid rgba(0, 255, 65, 0.2);
            padding-top: 30px;
        }

        .status-item { font-size: 0.8rem; color: var(--accent-color); letter-spacing: 1px; }
        .status-item span { color: var(--secondary-color); }

        .links {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
        }

        .link-item {
            text-decoration: none;
            color: var(--secondary-color);
            font-size: 1rem;
            letter-spacing: 3px;
            transition: all 0.3s ease;
            padding: 5px 15px;
            border: 1px solid transparent;
        }

        .link-item:hover {
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
            box-shadow: 0 0 15px var(--shadow-color);
        }

        .footer-terminal {
            font-size: 0.8rem;
            color: var(--accent-color);
            margin-top: 20px;
            font-style: italic;
        }

        /* Matrix Canvas */
        #matrix-rain {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; opacity: 0.1;
        }

        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: var(--primary-color); } }

    </style>
</head>
<body>
    <canvas id="matrix-rain"></canvas>
    <div class="main-frame">
        <div class="logo">KALKANOS</div>
        <div class="tagline">Armoring the Digital Frontier.</div>
        
        <div class="status-grid">
            <div class="status-item">CORE: <span>V0.1-GENESIS</span></div>
            <div class="status-item">ARCH: <span>IMMUTABLE-X64</span></div>
            <div class="status-item">STATUS: <span>INITIALIZING...</span></div>
            <div class="status-item">NETWORK: <span>STAGING AREA</span></div>
        </div>

        <div class="links">
            <a href="https://github.com/KalkanOS" class="link-item" target="_blank">SOURCE_CODE</a>
            <a href="#" class="link-item">COMMUNITY</a>
        </div>

        <div class="footer-terminal">> _ system_ready: true | waiting_for_deployment_protocol</div>
    </div>

    <script>
        const canvas = document.getElementById('matrix-rain');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const alphabet = "010101010101010101010101";
        const fontSize = 16;
        const columns = canvas.width/fontSize;
        const rainDrops = Array(Math.floor(columns)).fill(1);
        const draw = () => {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0F0';
            ctx.font = fontSize + 'px monospace';
            for(let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i*fontSize, rainDrops[i]*fontSize);
                if(rainDrops[i]*fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
                rainDrops[i]++;
            }
        };
        setInterval(draw, 50);
    </script>
</body>
</html>
